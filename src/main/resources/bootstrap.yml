#所有环境公用的配置属性
info:
  app-name: monitor-server
  author: sys
  email: sys@163.com

#server服务端相关配置
server:
  port: 10020

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: '*'

spring:
  application:
    name: monitor-server
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  cloud:
    bus:
      id: ${spring.application.name}:${server.port}
  datasource:
    # >= 6.x: com.mysql.cj.jdbc.Driver
    # <= 5.x: com.mysql.jdbc.Driver
    url: jdbc:postgresql://192.168.1.124:5432/monitor-server?allowPublicKeyRetrieval=true&useSSL=false&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
#当出现相同名字的类进行注册时，准许覆盖注册
  main:
    allow-bean-definition-overriding: true

#==============================druid监控相关配置====================================
  # http://localhost:10020/druid/index.html
  druid:
    # 初始化大小，最小，最大
    initial-size: 5
    min-idle: 3
    max-active: 30
    # 配置获取连接等待超时的时间
    max-wait: 60000
    # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒，下面是：1分钟
    time-between-eviction-runs-millis: 60000
    # 配置一个连接在池中最小生存的时间，单位是毫秒，下面是：5分钟
    min-evictable-idle-time-millis: 300000
    # 打开PSCache，并且指定每个连接上PSCache的大小
    pool-prepared-statements: true
    max-pool-prepared-statement-per-connection-size: 20
    # 配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
    filters: stat,wall,config
    # asyncInit是1.1.4中新增加的配置，如果有initialSize数量较多时，打开会加快应用启动时间
    asyncInit: true
    # 通过connectProperties属性来打开mergeSql功能；慢SQL记录
    #建立新连接时将发送到JDBC驱动程序的连接属性。字符串的格式必须为[propertyName = property;] *注 - “用户”和“密码”属性将被明确传递，因此不需要在此处包含。
    connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

#==============================druid监控配置====================================

#mybatis配置
mybatis:
  type-aliases-package: cn.hongt.monitor.server.entity
  mapper-locations: classpath:mapper/*.xml

mybatis-plus:
  configuration:
    cache-enabled: true
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  #打印日志到 控制台
#    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl    #打成docker镜像 - 日志到 控制台和 log文件

# swagger配置
swagger:
  title: 'monitor-硬件监控服务接口文档'
  base:
    package: cn.hongt.monitor.server.controller
  description: '数据服务接口文档'
  url: ''
  contact:
    name:
    email:
    url: ''
  version: 1.0

logging:
  level:
    root: info
    io.swagger.models.parameters.AbstractSerializableParameter: error
    cn.hongt.monitor.server.service.impl: debug                          # 改为 info 之后即可打印监控日志
#    cn.hongt.monitor.server.mapper: debug
#    com.baomidou.mybatisplus.core.mapper: debug
  config: classpath:log/logback.xml

datacenter:
  monitor:
    warnRecord:
      # 系统生成 告警日志excel文件的绝对路径
      path: /home/metefont/metefont/project/055/monitor
    disk:
      # 读取磁盘列表，使用 英文逗号 隔开的字符串
      path: /dev/mapper,/home/data,/home/nwp_demo_hx
    cpumory:
      # cpu、内存、IO读写 父路径
      path: /proc
    network:
      # 系统中 使用网卡的全路径
      ip: 192.168.1.124
      # 系统中网卡入站、出站流量的父路径
      cards: /sys/class/net
